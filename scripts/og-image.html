<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0a0a0a;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  /* Subtle radial glow */
  .glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 45%, rgba(232,148,58,0.06) 0%, transparent 70%);
  }
  /* Grid lines */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.3);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 32px;
    font-weight: 400;
  }
  .badge .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #E8943A;
  }
  h1 {
    font-size: 72px;
    font-weight: 600;
    letter-spacing: -0.03em;
    color: rgba(255,255,255,0.9);
    line-height: 1;
    margin-bottom: 20px;
  }
  h1 span {
    font-weight: 300;
    color: rgba(255,255,255,0.35);
  }
  .tagline {
    font-size: 18px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 300;
  }
  .separator {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,148,58,0.4), transparent);
    margin: 28px auto;
  }
  .bottom {
    position: absolute;
    bottom: 36px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.1);
    font-weight: 400;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="grid"></div>
  <div class="content">
    <div class="badge">
      <span class="dot"></span>
      AI-Native Studio
    </div>
    <h1>Gavroch<span>.Dev</span></h1>
    <div class="separator"></div>
    <p class="tagline">We design, code &amp; ship digital products</p>
  </div>
  <p class="bottom">gavroch.dev</p>
</body>
</html>
